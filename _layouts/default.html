<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }}{% if site.title %} - {{ site.title }}{% endif %}</title>
  <style>
    html,body{margin:0;padding:0;width:100%}
    body{padding:1rem;font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial}
    .site-header{margin-bottom:1rem}
    .site-title{font-size:1.5rem;margin:0;text-align:left}
    main{max-width:none;padding:0;margin:0;text-align:left}
    table{border-collapse:collapse}
    table th, table td{padding:.25rem .5rem;text-align:left}
  </style>
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
</body>
</html>
